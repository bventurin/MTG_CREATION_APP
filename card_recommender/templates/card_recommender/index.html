<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Card Recommender</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f4f9;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .checkbox-group label {
            display: inline-block;
            margin-right: 15px;
            font-weight: normal;
        }

        button {
            padding: 10px 20px;
            background-color: #6200ea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #3700b3;
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 10px;
            background: white;
            border-radius: 8px;
            text-align: center;
        }

        .card img {
            max-width: 100%;
            border-radius: 4px;
        }

        .card h3 {
            font-size: 1rem;
            margin: 10px 0;
        }

        .back-link {
            display: block;
            margin-bottom: 20px;
            color: #6200ea;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/" class="back-link">&larr; Back to Home</a>
        <h1>AI Card Recommender</h1>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="format">Choose Format:</label>
                <select name="format" id="format">
                    <option value="standard">Standard</option>
                    <option value="modern">Modern</option>
                    <option value="commander">Commander</option>
                    <option value="legacy">Legacy</option>
                    <option value="pioneer">Pioneer</option>
                </select>
            </div>

            <div class="form-group">
                <label>Choose Colors:</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="colors" value="W"> White</label>
                    <label><input type="checkbox" name="colors" value="U"> Blue</label>
                    <label><input type="checkbox" name="colors" value="B"> Black</label>
                    <label><input type="checkbox" name="colors" value="R"> Red</label>
                    <label><input type="checkbox" name="colors" value="G"> Green</label>
                </div>
            </div>

            <button type="submit">Get Recommendations</button>
        </form>

        {% if recommendations %}
        <div class="results">
            {% for card in recommendations %}
            <div class="card">
                {% if card.image_uris %}
                <img src="{{ card.image_uris.normal }}" alt="{{ card.name }}">
                {% else %}
                <div
                    style="height: 280px; background: #eee; display: flex; align-items: center; justify-content: center;">
                    No Image</div>
                {% endif %}
                <h3>{{ card.name }}</h3>
            </div>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</body>

</html>
