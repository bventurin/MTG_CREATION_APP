name: Django CI/CD to Elastic Beanstalk

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run Django Tests & SonarCloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Run Django system checks
        run: python manage.py check

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    name: Deploy to Elastic Beanstalk
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Set EB environment variables from secrets
        run: |
          aws elasticbeanstalk update-environment \
            --environment-name AetherFlow-env \
            --option-settings \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=DATABASE_URL,Value="${{ secrets.DATABASE_URL }}" \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=GEMINI_API_KEY,Value="${{ secrets.GEMINI_API_KEY }}" \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=QR_CODE_ENDPOINT,Value="${{ secrets.QR_CODE_ENDPOINT }}" \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=VOUCHER_SERVICE_ENDPOINT,Value="${{ secrets.VOUCHER_SERVICE_ENDPOINT }}" \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=FILECONVERT_API_BASE_URL,Value="${{ secrets.FILECONVERT_API_BASE_URL }}" \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=SECRET_KEY,Value="${{ secrets.DJANGO_SECRET_KEY }}" \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=DD_API_KEY,Value="${{ secrets.DD_API_KEY }}" \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=DD_SITE,Value="${{ secrets.DD_SITE }}" \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=DD_ENV,Value="production" \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=DD_SERVICE,Value="AetherFlow-app" \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=DD_VERSION,Value="${{ github.sha }}" \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=DD_LOGS_INJECTION,Value="true" \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=DD_RUNTIME_METRICS_ENABLED,Value="true" \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=DD_TRACE_ENABLED,Value="true" \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=AWS_S3_BUCKET_NAME,Value="magic-card-data" \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=VOUCHER_IMAGE_TEMP_DIR,Value="/tmp"

      - name: Wait for environment to be ready
        run: |
          echo "Waiting for environment to be ready..."
          aws elasticbeanstalk wait environment-updated --environment-name AetherFlow-env
          echo "Environment is ready for deployment."

      - name: Create deployment package (ZIP)
        run: zip -r deployment-package.zip . -x "*.git*" "*.venv*"

      - name: Deploy to AWS Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: AetherFlow-app
          environment_name: AetherFlow-env
          version_label: ${{ github.sha }}-${{ github.run_id }}
          region: eu-west-1
          deployment_package: deployment-package.zip

  zap_scan:
    runs-on: ubuntu-latest
    needs: deploy
    name: Run ZAP Scan
    permissions:
      issues: write
    env:
      REQUIRE_SRI: "False"
    steps:
      - name: ZAP Scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25
        with:
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          target: ${{ vars.APPLICATION_URL }}

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: ZAP-Baseline-Report
          path: |
            report_html.html
            report_json.json       
            report_md.md
